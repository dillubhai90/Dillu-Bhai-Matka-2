<style>
body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Animated Border */
.container {
    position: relative;
    width: 85%;
    max-width: 320px;
    padding: 20px;
    border-radius: 20px;
    background: #000;
    text-align: center;
    z-index: 1;
}

/* Glowing animated border */
.container::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 20px;
    background: linear-gradient(45deg, yellow, orange, yellow);
    z-index: -1;
    animation: borderMove 3s linear infinite;
}

.container::after {
    content: "";
    position: absolute;
    inset: 2px;
    background: #000;
    border-radius: 20px;
    z-index: -1;
}

@keyframes borderMove {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
}

/* Heading */
h1 {
    color: #00c3ff;
    font-size: 18px;
    margin-bottom: 15px;
}

/* Logo */
.logo {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    box-shadow: 0 0 15px yellow;
    margin-bottom: 15px;
}

/* Text */
.text {
    color: #00c3ff;
    font-size: 14px;
    margin-bottom: 20px;
}

/* Button */
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #1e88e5;
    color: #fff;
    text-decoration: none;
    padding: 12px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    animation: zoom 1.5s infinite;
}

/* Telegram icon */
.btn img {
    width: 22px;
}

/* Zoom Animation */
@keyframes zoom {
    0% { transform: scale(1); }
    50% { transform: scale(1.07); }
    100% { transform: scale(1); }
}

/* Footer */
.footer {
    color: #ccc;
    font-size: 12px;
    margin-top: 15px;
}

.disclaimer {
    color: #888;
    font-size: 10px;
    margin-top: 10px;
}
</style>

</head>
